{% set name = "qcengine" %}
{% set version = "0.50.0rc3" %}
{% set sha256 = "5868b9b9ebe9aba33231a88c49bfc8850475f08b80ea3b76e9cadb8870ec9fd1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . --no-deps -vvv

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
    - setuptools-scm
  run:
    - python >={{ python_min }}
    - packaging
    - pydantic >=2.11,<3
    - pydantic-settings
    - pyyaml
    - py-cpuinfo
    - psutil
    - qcelemental >=0.50.0rc4,<0.70.0

test:
  imports:
    - qcengine
  requires:
    - pytest
    - msgpack-python
    - pip
    - python {{ python_min }}
    - psi4
    - libint=2.9.0=*_4
    - qcmanybody >=0.7.0
  commands:
    - test -f $SP_DIR/qcengine/__init__.py
    - pip check
    - python -c "import qcengine as qc;assert qc.__version__ == '{{ version }}', f'{qc.__version__=} differs from recipe=\'{{ version }}\''"
    - python -c "import importlib.metadata as md;assert md.version('{{ name }}') == '{{ version }}', f'''{md.version('{{ name }}')=} differs from recipe=\'{{ version }}\''''"
    - pytest --pyargs qcengine

about:
  home: http://github.com/MolSSI/QCEngine
  doc_url: https://molssi.github.io/QCEngine/
  dev_url: http://github.com/MolSSI/QCEngine
  license: BSD-3-Clause
  license_file: LICENSE
  summary: A wrapper for Quantum Chemistry engines that adheres to the MolSSI (molssi.org) QCSchema.

extra:
  recipe-maintainers:
    - dgasmith
    - lnaden
    - bennybp
    - loriab
